<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RapidGear - 汽车爱好者论坛</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>RapidGear</h1>
<div>
  <a href="login.html">登录</a> | 
  <a href="register.html">注册</a> | 
  <a href="post.html">发帖</a>
</div>
<div id="posts"></div>
<script>
fetch('/posts')
.then(res=>res.json())
.then(posts=>{
  const container = document.getElementById('posts');
  posts.forEach(p=>{
    const div = document.createElement('div');
    div.className='post';
    div.innerHTML=`<h3>${p.title}</h3><p>${p.content}</p><small>by ${p.username}</small>`;
    div.onclick = ()=>location.href=`post.html?id=${p.id}`;
    container.appendChild(div);
  });
});
</script>
</body>
</html>
