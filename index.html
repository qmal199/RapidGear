<!DOCTYPE html> <html lang="zh"> <head>     <meta charset="UTF-8">     <meta name="viewport" content="width=device-width, initial-scale=1.0">     <title>🚗 汽车发烧友论坛</title>     <style>         body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f4f9; margin: 0; padding: 0; }         .container { max-width: 600px; margin: 0 auto; padding: 15px; }         .card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }         input, textarea, button { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }         button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }         button:hover { background: #0056b3; }         .post-img { max-width: 100%; border-radius: 4px; margin-top: 10px; }         .meta { color: #888; font-size: 0.9em; margin-bottom: 10px; display: block; }         h1 { text-align: center; color: #333; }         .form-section { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 30px; }     </style> </head> <body>  <div class="container">     <h1>🚗 汽车论坛</h1>      <!-- 发帖区域 -->     <div class="form-section card">         <h3>发布新话题</h3>         <form action="/api/posts" method="POST" enctype="multipart/form-data">             <input type="text" name="author" placeholder="你的昵称" required>             <input type="text" name="title" placeholder="帖子标题" required>             <textarea name="content" rows="4" placeholder="聊聊你的车..." required></textarea>             <input type="file" name="image" accept="image/*">             <button type="submit">发布帖子</button>         </form>     </div>      <!-- 帖子列表区域 -->     <div id="posts-container">         <!-- 帖子会通过 JavaScript 加载到这里 -->         <p style="text-align:center; color:#666;">加载中...</p>     </div> </div>  <script>     // 页面加载完成后，从服务器获取数据     async function loadPosts() {         try {             const res = await fetch('/api/posts');             const posts = await res.json();             const container = document.getElementById('posts-container');                          if (posts.length === 0) {                 container.innerHTML = '<p style="text-align:center;">暂无帖子，快来抢沙发！</p>';                 return;             }              container.innerHTML = posts.map(post => `                 <div class="card">                     <h3>${post.title}</h3>                     <span class="meta">作者: ${post.author} | 时间: ${post.date}</span>                     <p>${post.content}</p>                     ${post.image ? `<img src="${post.image}" class="post-img">` : ''}                 </div>             `).join('');         } catch (err) {             console.error(err);         }     }      loadPosts(); </script>  </body> </html>
